extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  attributes/privacy:
    actions:
      - key: gen_ai.prompt
        action: delete
      - key: gen_ai.completion
        action: delete
      - key: gen_ai.input.messages
        action: delete
      - key: gen_ai.output.messages
        action: delete
      - key: llm.prompts
        action: delete
      - key: llm.completions
        action: delete
  batch:
    send_batch_size: 256
    timeout: 5s

exporters:
  otlp_http/agentledger:
    endpoint: http://127.0.0.1:9800
    compression: gzip
    sending_queue:
      enabled: false
    retry_on_failure:
      enabled: false

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [attributes/privacy, batch]
      exporters: [otlp_http/agentledger]
