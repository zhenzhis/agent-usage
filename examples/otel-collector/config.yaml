receivers:
  otlp:
    protocols:
      http:
        endpoint: 127.0.0.1:4318

processors:
  attributes/privacy:
    actions:
      - key: gen_ai.prompt
        action: delete
      - key: gen_ai.completion
        action: delete
      - key: gen_ai.input.messages
        action: delete
      - key: gen_ai.output.messages
        action: delete
      - key: llm.prompts
        action: delete
      - key: llm.completions
        action: delete
  batch:
    send_batch_size: 256
    timeout: 5s

exporters:
  otlphttp/agentledger:
    endpoint: http://127.0.0.1:9800
    compression: gzip
    sending_queue:
      enabled: true
      queue_size: 1024
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 5m
    headers:
      Authorization: ${env:AGENT_LEDGER_AUTH_HEADER}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [attributes/privacy, batch]
      exporters: [otlphttp/agentledger]
