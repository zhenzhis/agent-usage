<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='6' fill='%23000000'/><path d='M14 42h36M18 35l8-8 8 6 12-15' fill='none' stroke='%23f5f5f5' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<title>agent-usage</title>
<link rel="stylesheet" href="styles.css">
<script defer src="vendor/echarts/echarts.min.js"></script>
<script defer src="app.js"></script>
</head>
<body>
<div id="global-loader" class="loader" aria-hidden="true"></div>
<div class="app-shell">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <div class="brand-copy">
        <h1>agent-usage</h1>
        <span id="range-caption" class="range-caption"></span>
      </div>
    </div>

    <div class="control-surface" aria-label="Dashboard controls">
      <div id="preset-bar" class="segmented" role="group" aria-label="Time range"></div>
      <div id="custom-range-wrap" class="date-range is-hidden">
        <label class="field">
          <span data-i18n="from">From</span>
          <input type="date" id="from">
        </label>
        <label class="field">
          <span data-i18n="to">To</span>
          <input type="date" id="to">
        </label>
      </div>

      <label class="field compact">
        <span data-i18n="granularity">Granularity</span>
        <select id="sel-granularity"></select>
      </label>
      <label class="field compact">
        <span data-i18n="source">Source</span>
        <select id="filter-source"></select>
      </label>
      <label class="field model-field">
        <span data-i18n="model">Model</span>
        <select id="filter-model"></select>
      </label>

      <div class="action-cluster">
        <button class="icon-btn primary" id="btn-refresh" type="button">
          <svg class="spin-target" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 12a8 8 0 1 1-2.35-5.66M20 4v6h-6"/></svg>
          <span data-i18n="refresh">Refresh</span>
        </button>
        <button class="icon-btn" id="btn-auto-refresh" type="button">
          <span id="auto-status">Auto</span>
        </button>
        <select id="sel-refresh-interval" aria-label="Refresh interval"></select>
        <select id="sel-theme" aria-label="Theme"></select>
        <select id="sel-lang" aria-label="Language"></select>
      </div>
    </div>
  </header>

  <main>
    <section class="kpi-grid" aria-label="Usage summary">
      <article class="kpi-card accent-cyan">
        <span class="kpi-label" data-i18n="totalTokens">Total Tokens</span>
        <strong class="kpi-value" id="s-tokens">0</strong>
        <span class="kpi-sub" id="s-token-mix">-</span>
      </article>
      <article class="kpi-card accent-green">
        <span class="kpi-label" data-i18n="totalCost">Total Cost</span>
        <strong class="kpi-value" id="s-cost">$0.00</strong>
        <span class="kpi-sub" id="s-cost-per-call">-</span>
      </article>
      <article class="kpi-card accent-blue">
        <span class="kpi-label" data-i18n="sessions">Sessions</span>
        <strong class="kpi-value" id="s-sessions">0</strong>
        <span class="kpi-sub" id="s-calls">0 calls</span>
      </article>
      <article class="kpi-card accent-amber">
        <span class="kpi-label" data-i18n="prompts">Prompts</span>
        <strong class="kpi-value" id="s-prompts">0</strong>
        <span class="kpi-sub" id="s-cache-hit">0% cache</span>
      </article>
    </section>

    <section class="chart-grid" aria-label="Usage charts">
      <article class="panel panel-wide">
        <div class="panel-header">
          <h2 data-i18n="activityMatrix">Activity Matrix</h2>
          <span class="panel-meta" id="activity-meta"></span>
        </div>
        <div class="chart chart-compact" id="chart-activity"></div>
      </article>
      <article class="panel panel-wide">
        <div class="panel-header">
          <h2 data-i18n="tokenThroughput">Token Throughput</h2>
          <span class="panel-meta" id="throughput-meta"></span>
        </div>
        <div class="chart" id="chart-tokens"></div>
      </article>
      <article class="panel">
        <div class="panel-header">
          <h2 data-i18n="costOverTime">Cost Trend</h2>
        </div>
        <div class="chart" id="chart-cost"></div>
      </article>
      <article class="panel">
        <div class="panel-header">
          <h2 data-i18n="modelAllocation">Model Allocation</h2>
        </div>
        <div class="chart" id="chart-models"></div>
      </article>
    </section>

    <section class="ledger-panel" aria-label="Session ledger">
      <div class="ledger-header">
        <div>
          <h2 data-i18n="sessionLedger">Session Ledger</h2>
          <span id="ledger-meta" class="panel-meta"></span>
        </div>
        <label class="search-field">
          <span class="visually-hidden" data-i18n="filterProject">Filter by project</span>
          <input type="text" id="filter-project" autocomplete="off">
        </label>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th><button class="sort-button" type="button" data-sort="source"><span data-i18n="source">Source</span><span class="sort-mark"></span></button></th>
              <th><button class="sort-button" type="button" data-sort="project"><span data-i18n="project">Project</span><span class="sort-mark"></span></button></th>
              <th><button class="sort-button" type="button" data-sort="git_branch"><span data-i18n="branch">Branch</span><span class="sort-mark"></span></button></th>
              <th><button class="sort-button" type="button" data-sort="start_time"><span data-i18n="time">Time</span><span class="sort-mark"></span></button></th>
              <th><button class="sort-button" type="button" data-sort="prompts"><span data-i18n="prompts">Prompts</span><span class="sort-mark"></span></button></th>
              <th><button class="sort-button" type="button" data-sort="tokens"><span data-i18n="tokens">Tokens</span><span class="sort-mark"></span></button></th>
              <th><button class="sort-button" type="button" data-sort="total_cost"><span data-i18n="cost">Cost</span><span class="sort-mark"></span></button></th>
              <th class="expand-col"></th>
            </tr>
          </thead>
          <tbody id="session-table"></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </section>
  </main>

  <div id="status-line" class="status-line" role="status" aria-live="polite"></div>
</div>
</body>
</html>
