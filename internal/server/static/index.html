<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>agent-usage — AI Coding Agent Usage</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;--text:#e1e4ed;--muted:#8b8fa3;--accent:#6366f1;--green:#22c55e;--blue:#3b82f6;--orange:#f59e0b;--pink:#ec4899}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{padding:20px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:20px;font-weight:600}
.header h1 span{color:var(--accent)}
.controls{display:flex;gap:12px;align-items:center}
.controls input[type=date]{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;font-size:13px}
.controls button{background:var(--accent);color:#fff;border:none;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:13px}
.controls button:hover{opacity:0.9}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:24px 32px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px}
.stat-card .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.stat-card .value{font-size:28px;font-weight:700;margin-top:4px}
.stat-card .value.cost{color:var(--green)}
.stat-card .value.tokens{color:var(--blue)}
.stat-card .value.sessions{color:var(--orange)}
.stat-card .value.prompts{color:var(--pink)}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:0 32px 24px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px}
.chart-card h3{font-size:14px;margin-bottom:12px;color:var(--muted)}
.chart-container{height:300px}
.sessions-section{padding:0 32px 32px}
.sessions-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px}
.sessions-card h3{font-size:14px;margin-bottom:12px;color:var(--muted)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);color:var(--muted);font-weight:500}
td{padding:8px 12px;border-bottom:1px solid var(--border)}
tr:hover td{background:rgba(99,102,241,0.05)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge.claude{background:rgba(99,102,241,0.2);color:var(--accent)}
.badge.codex{background:rgba(34,197,94,0.2);color:var(--green)}
</style>
</head>
<body>
<div class="header">
  <h1><span>agent-usage</span> AI Usage Dashboard</h1>
  <div class="controls">
    <input type="date" id="from"> <span style="color:var(--muted)">to</span> <input type="date" id="to">
    <button onclick="refresh()">Apply</button>
  </div>
</div>
<div class="stats">
  <div class="stat-card"><div class="label">Total Cost</div><div class="value cost" id="s-cost">$0.00</div></div>
  <div class="stat-card"><div class="label">Total Tokens</div><div class="value tokens" id="s-tokens">0</div></div>
  <div class="stat-card"><div class="label">Sessions</div><div class="value sessions" id="s-sessions">0</div></div>
  <div class="stat-card"><div class="label">Prompts</div><div class="value prompts" id="s-prompts">0</div></div>
</div>
<div class="charts">
  <div class="chart-card"><h3>Cost by Model</h3><div class="chart-container" id="chart-pie"></div></div>
  <div class="chart-card"><h3>Cost Over Time</h3><div class="chart-container" id="chart-cost"></div></div>
  <div class="chart-card"><h3>Token Usage Over Time</h3><div class="chart-container" id="chart-tokens"></div></div>
  <div class="chart-card"><h3>Daily Sessions</h3><div class="chart-container" id="chart-sessions"></div></div>
</div>
<div class="sessions-section">
  <div class="sessions-card">
    <h3>Sessions</h3>
    <table><thead><tr><th>Source</th><th>Project</th><th>Branch</th><th>Time</th><th>Prompts</th><th>Tokens</th><th>Cost</th></tr></thead>
    <tbody id="session-table"></tbody></table>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
