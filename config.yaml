server:
  port: 9800
  bind_address: "127.0.0.1"
collectors:
  claude:
    enabled: true
    paths: ["~/.claude/projects"]
    scan_interval: 60s
  codex:
    enabled: true
    paths: ["~/.codex/sessions"]
    scan_interval: 30s
  openclaw:
    enabled: true
    paths: ["~/.openclaw/agents"]
    scan_interval: 60s
  opencode:
    enabled: true
    paths: ["~/.local/share/opencode/opencode.db"]
    scan_interval: 30s
  kiro:
    enabled: true
    paths:
      - "~/.local/share/kiro-cli/data.sqlite3"
      - "~/.kiro/sessions/cli"
    scan_interval: 60s
  pi:
    enabled: true
    paths: ["~/.pi/agent/sessions"]
    scan_interval: 60s
storage:
  path: "./agent-usage.db"
pricing:
  # Prices are fetched from GitHub (litellm). Set HTTPS_PROXY env var if this fails.
  sync_interval: 1h

privacy:
  redact_paths: false
  hash_session_ids: false
  hide_project_names: false
  screenshot_mode: false

projects:
  aliases: {}
  exclude: []

budgets:
  enabled: false
  rules:
    # - name: daily-global-cost
    #   period: day
    #   scope: global
    #   metric: cost_usd
    #   limit: 25
    #   warn_ratio: 0.8
