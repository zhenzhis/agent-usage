server:
  port: 9800
  bind_address: "127.0.0.1"
collectors:
  claude:
    enabled: true
    paths: ["~/.claude/projects"]
    scan_interval: 60s
  codex:
    enabled: true
    paths: ["~/.codex/sessions"]
    scan_interval: 30s
  openclaw:
    enabled: true
    paths: ["~/.openclaw/agents"]
    scan_interval: 60s
  opencode:
    enabled: true
    paths: ["~/.local/share/opencode/opencode.db"]
    scan_interval: 30s
  kiro:
    enabled: true
    paths:
      - "~/.local/share/kiro-cli/data.sqlite3"
      - "~/.kiro/sessions/cli"
    scan_interval: 60s
  pi:
    enabled: true
    paths: ["~/.pi/agent/sessions"]
    scan_interval: 60s
storage:
  path: "./agent-ledger.db"
pricing:
  # Official OpenAI/Anthropic seed prices override LiteLLM fallback.
  # Add overrides for enterprise contracts or third-party relay prices.
  sync_interval: 1h
  stale_after: 24h
  mode: official-plus-litellm
  overrides: []

privacy:
  redact_paths: false
  hash_session_ids: false
  hide_project_names: false
  screenshot_mode: false
  default_preset: normal

projects:
  aliases: {}
  exclude: []

budgets:
  enabled: false
  rules:
    # - name: daily-global-cost
    #   period: day
    #   scope: global
    #   metric: cost_usd
    #   limit: 25
    #   warn_ratio: 0.8

quota:
  enabled: false
  plan: custom
  monthly_budget: 0
  token_budget: 0
  prompt_budget: 0
  reset_day: 1
  window_5h: true

watchdog:
  enabled: true
  token_spike_multiplier: 4
  min_calls: 8
  night_start_hour: 22
  night_end_hour: 6

rbac:
  enabled: false
  read_only: false

policies:
  enabled: false
  require_privacy_export: false
  rules: []

webhooks:
  enabled: false
  url: ""
  timeout: 10s
  max_events: 20

teams:
  machine_name: ""
  git_author: ""
  groups: {}

integrations:
  otlp_receiver:
    enabled: false
    max_body_bytes: 4194304
    max_spans: 1000

gateway:
  # Optional local OpenAI-compatible gateway. Disabled by default.
  # The request body is forwarded in memory to the upstream; Agent Ledger only stores usage metadata.
  enabled: false
  upstream_base_url: "https://api.openai.com"
  api_key_env: "OPENAI_API_KEY"
  include_stream_usage: true
  max_body_bytes: 4194304
  max_response_bytes: 33554432
  timeout: 120s
