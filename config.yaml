server:
  port: 9800
  bind_address: "127.0.0.1"
collectors:
  claude:
    enabled: true
    paths: ["~/.claude/projects"]
    scan_interval: 60s
  codex:
    enabled: true
    paths: ["~/.codex/sessions"]
    scan_interval: 60s
  openclaw:
    enabled: true
    paths: ["~/.openclaw/agents"]
    scan_interval: 60s
  opencode:
    enabled: true
    paths: ["~/.local/share/opencode/opencode.db"]
    scan_interval: 60s
  kiro:
    enabled: true
    paths: ["~/.kiro/sessions/cli"]
    scan_interval: 60s
  pi:
    enabled: true
    paths: ["~/.pi/agent/sessions"]
    scan_interval: 60s
storage:
  path: "./agent-usage.db"
pricing:
  # Prices are fetched from GitHub (litellm). Set HTTPS_PROXY env var if this fails.
  sync_interval: 1h
