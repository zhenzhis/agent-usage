services:
  agent-usage:
    build: .
    image: agent-usage:local
    container_name: agent-usage
    restart: unless-stopped
    # Run as host user so bind-mounted dirs (especially ~/.claude with mode 700) are readable.
    # Change to match your UID/GID: run `id -u` and `id -g` to find yours.
    user: "1000:1000"
    ports:
      - "127.0.0.1:9800:9800"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      # Pricing sync fetches from GitHub. Uncomment if network access to GitHub is restricted:
      # - HTTPS_PROXY=http://your-proxy:port
      # Uncomment for China proxy (only affects builds, not runtime):
      # - GOPROXY=https://goproxy.cn,direct
    volumes:
      # Persistent database
      - type: bind
        source: ./data
        target: /data
        bind:
          create_host_path: true
      # Host session directories (read-only).
      # Default tracks Claude, Codex, and OpenCode. Bind mounts use
      # create_host_path: false so missing paths fail explicitly instead of
      # being created by Docker.
      - type: bind
        source: ~/.claude/projects
        target: /sessions/claude
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ~/.codex/sessions
        target: /sessions/codex
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ~/.local/share/opencode
        target: /sessions/opencode
        read_only: true
        bind:
          create_host_path: false
      # Only enable the remaining agents if they are installed.
      # - ~/.openclaw/agents:/sessions/openclaw:ro
      # - ~/.local/share/kiro-cli:/sessions/kiro-cli:ro
      # - ~/.kiro/sessions/cli:/sessions/kiro-sessions:ro
      # - ~/.pi/agent/sessions:/sessions/pi:ro
      # Optional: custom config override
      - ./config.docker.yaml:/etc/agent-usage/config.yaml:ro
