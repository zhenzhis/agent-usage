server:
  port: 9800
  bind_address: "0.0.0.0"

collectors:
  claude:
    enabled: true
    paths: ["/sessions/claude"]
    scan_interval: 60s
  codex:
    enabled: true
    paths: ["/sessions/codex"]
    scan_interval: 30s
  openclaw:
    enabled: false
    paths: ["/sessions/openclaw"]
    scan_interval: 60s
  opencode:
    enabled: true
    paths: ["/sessions/opencode/opencode.db"]
    scan_interval: 30s
  kiro:
    enabled: false
    paths:
      - "/sessions/kiro-cli/data.sqlite3"
      - "/sessions/kiro-sessions"
    scan_interval: 60s
  pi:
    enabled: false
    paths: ["/sessions/pi"]
    scan_interval: 60s

storage:
  path: "/data/agent-usage.db"

pricing:
  # Prices are fetched from GitHub (litellm). Set HTTPS_PROXY env var if this fails.
  sync_interval: 1h

privacy:
  redact_paths: false
  hash_session_ids: false
  hide_project_names: false
  screenshot_mode: false

projects:
  aliases: {}
  exclude: []

budgets:
  enabled: false
  rules:
    # - name: daily-global-cost
    #   period: day
    #   scope: global
    #   metric: cost_usd
    #   limit: 25
    #   warn_ratio: 0.8
