server:
  port: 9800
  bind_address: "0.0.0.0"

collectors:
  claude:
    enabled: true
    paths: ["/sessions/claude"]
    scan_interval: 60s
  codex:
    enabled: true
    paths: ["/sessions/codex"]
    scan_interval: 60s

storage:
  path: "/data/agent-usage.db"

pricing:
  # Prices are fetched from GitHub (litellm). Set HTTPS_PROXY env var if this fails.
  sync_interval: 1h
