server:
  port: 9800
  bind_address: "0.0.0.0"

collectors:
  claude:
    enabled: true
    paths: ["/sessions/claude"]
    scan_interval: 60s
  codex:
    enabled: true
    paths: ["/sessions/codex"]
    scan_interval: 30s
  openclaw:
    enabled: false
    paths: ["/sessions/openclaw"]
    scan_interval: 60s
  opencode:
    enabled: true
    paths: ["/sessions/opencode/opencode.db"]
    scan_interval: 30s
  kiro:
    enabled: false
    paths:
      - "/sessions/kiro-cli/data.sqlite3"
      - "/sessions/kiro-sessions"
    scan_interval: 60s
  pi:
    enabled: false
    paths: ["/sessions/pi"]
    scan_interval: 60s

storage:
  path: "/data/agent-ledger.db"

pricing:
  # Official OpenAI/Anthropic seed prices override LiteLLM fallback.
  # Add overrides for enterprise contracts or third-party relay prices.
  sync_interval: 1h
  stale_after: 24h
  mode: official-plus-litellm
  overrides: []

privacy:
  redact_paths: false
  hash_session_ids: false
  hide_project_names: false
  screenshot_mode: false
  default_preset: normal

projects:
  aliases: {}
  exclude: []

budgets:
  enabled: false
  rules:
    # - name: daily-global-cost
    #   period: day
    #   scope: global
    #   metric: cost_usd
    #   limit: 25
    #   warn_ratio: 0.8

quota:
  enabled: false
  plan: custom
  monthly_budget: 0
  token_budget: 0
  prompt_budget: 0
  reset_day: 1
  window_5h: true

watchdog:
  enabled: true
  token_spike_multiplier: 4
  min_calls: 8
  night_start_hour: 22
  night_end_hour: 6

rbac:
  enabled: false
  read_only: false

policies:
  enabled: false
  require_privacy_export: false
  rules: []

webhooks:
  enabled: false
  url: ""
  timeout: 10s
  max_events: 20

teams:
  machine_name: ""
  git_author: ""
  groups: {}
